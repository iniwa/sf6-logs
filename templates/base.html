<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SF6 Stats{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/common.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div id="top-bar">
        <a href="/" class="brand">SF6 Stats</a>
        <div class="nav-links">
            <a href="/">Dashboard</a>
            <a href="/overlay-settings">Overlay</a>
            <a href="/settings">Settings</a>
        </div>
        <div class="status-area">
            <select id="theme-select" style="background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:2px 6px;font-size:0.75rem;" onchange="setTheme(this.value)">
                <option value="">Dark</option>
                <option value="theme-light">Light</option>
                <option value="theme-sf6">SF6</option>
            </select>
            <span id="cfn-badge" class="badge badge-off">CFN</span>
            <span id="mock-badge" class="badge badge-mock" style="display:none">MOCK</span>
        </div>
    </div>
    <div id="toast-container"></div>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <script src="{{ url_for('static', filename='js/common.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
